<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <style>
      .fish-body { fill: #1e3a8a; }
      .fish-accent { fill: #3b82f6; }
      .fish-eye { fill: #ffffff; }
      .wave { fill: #0891b2; opacity: 0.2; }
      .bg { fill: #ffffff; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="180" height="180" rx="40"/>
  
  <!-- Main circle background -->
  <circle cx="90" cy="90" r="70" fill="#1e3a8a"/>
  
  <!-- Wave elements -->
  <path class="wave" d="M20 120 Q40 100 60 120 T100 120 T140 120 T180 120 L180 180 L20 180 Z"/>
  <path class="wave" d="M20 140 Q40 120 60 140 T100 140 T140 140 T180 140 L180 180 L20 180 Z"/>
  <path class="wave" d="M20 160 Q40 140 60 160 T100 160 T140 160 T180 160 L180 180 L20 180 Z"/>
  
  <!-- Fish body -->
  <ellipse class="fish-body" cx="90" cy="80" rx="35" ry="18" transform="rotate(-5 90 80)"/>
  
  <!-- Fish tail -->
  <path class="fish-body" d="M45 80 L25 65 L35 80 L25 95 Z"/>
  
  <!-- Fish fins -->
  <ellipse class="fish-accent" cx="75" cy="105" rx="8" ry="4" transform="rotate(-5 75 105)"/>
  <ellipse class="fish-accent" cx="65" cy="55" rx="6" ry="3" transform="rotate(-5 65 55)"/>
  
  <!-- Fish eye -->
  <circle class="fish-eye" cx="110" cy="70" r="6"/>
  <circle class="fish-body" cx="112" cy="67" r="2"/>
  
  <!-- Additional details -->
  <path class="fish-accent" d="M70 80 Q90 75 110 80" stroke="#3b82f6" stroke-width="2" fill="none"/>
  <path class="fish-accent" d="M75 85 Q90 82 105 85" stroke="#3b82f6" stroke-width="1.5" fill="none"/>
</svg>