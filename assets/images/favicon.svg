<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <style>
      .fish-body { fill: #1e3a8a; }
      .fish-accent { fill: #3b82f6; }
      .fish-eye { fill: #ffffff; }
      .wave { fill: #0891b2; opacity: 0.3; }
    </style>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Wave elements -->
  <path class="wave" d="M2 20 Q8 16 14 20 T26 20 L26 30 L2 30 Z"/>
  <path class="wave" d="M2 24 Q8 20 14 24 T26 24 L26 30 L2 30 Z"/>
  
  <!-- Fish body -->
  <ellipse class="fish-body" cx="16" cy="14" rx="8" ry="4" transform="rotate(-10 16 14)"/>
  
  <!-- Fish tail -->
  <path class="fish-body" d="M6 14 L2 10 L4 14 L2 18 Z"/>
  
  <!-- Fish fins -->
  <ellipse class="fish-accent" cx="14" cy="18" rx="2" ry="1" transform="rotate(-10 14 18)"/>
  <ellipse class="fish-accent" cx="12" cy="10" rx="1.5" ry="0.8" transform="rotate(-10 12 10)"/>
  
  <!-- Fish eye -->
  <circle class="fish-eye" cx="20" cy="12" r="1.5"/>
  <circle class="fish-body" cx="20.5" cy="11.5" r="0.5"/>
</svg>