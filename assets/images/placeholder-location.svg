<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="600" height="250">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .border { fill: none; stroke: #e2e8f0; stroke-width: 2; stroke-dasharray: 5,5; }
      .icon { fill: #64748b; }
      .text { fill: #64748b; font-family: 'Inter', sans-serif; font-size: 14px; text-anchor: middle; }
      .title { fill: #1e3a8a; font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; text-anchor: middle; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="600" height="250" rx="8"/>
  <rect class="border" x="10" y="10" width="580" height="230" rx="8"/>
  
  <!-- Building icon -->
  <rect class="icon" x="250" y="80" width="100" height="60" fill="#e2e8f0"/>
  <rect class="icon" x="250" y="80" width="100" height="60" fill="none" stroke="#64748b" stroke-width="2"/>
  
  <!-- Windows -->
  <rect class="icon" x="260" y="90" width="15" height="15" fill="#64748b"/>
  <rect class="icon" x="280" y="90" width="15" height="15" fill="#64748b"/>
  <rect class="icon" x="305" y="90" width="15" height="15" fill="#64748b"/>
  <rect class="icon" x="325" y="90" width="15" height="15" fill="#64748b"/>
  
  <!-- Door -->
  <rect class="icon" x="290" y="110" width="20" height="30" fill="#64748b"/>
  
  <!-- Text -->
  <text class="title" x="300" y="170">Restaurant Location</text>
  <text class="text" x="300" y="190">Beautiful restaurant interior</text>
  <text class="text" x="300" y="210">image will be displayed here</text>
</svg>